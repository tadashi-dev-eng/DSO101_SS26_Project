name: Build and publish Docker image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and push Docker image to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-app:${{ github.sha }}
          platforms: linux/amd64,linux/arm64

      - name: Notify Render to redeploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_WEBHOOK }}" ]; then
            echo "Calling Render deploy hook..."
            curl -X POST "${{ secrets.RENDER_DEPLOY_WEBHOOK }}"
          else
            echo "No Render deploy hook configured, skipping redeploy."
          fi
