name: CI/CD pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  list-workflows:
    name: List available workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show workflow files
        run: |
          echo "CI/CD workflow files in .github/workflows:"
          find .github/workflows -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) | sort

  frontend:
    name: Frontend build and test
    runs-on: ubuntu-latest
    needs: [list-workflows]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Generate frontend coverage
        working-directory: frontend
        run: npm run coverage

  backend:
    name: Backend build and test
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Run backend tests
        working-directory: backend
        run: npm run test

      - name: Generate backend coverage
        working-directory: backend
        run: npm run coverage

  sonarcloud:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    needs: [backend]
    if: ${{ secrets.SONAR_TOKEN != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate frontend coverage
        working-directory: frontend
        run: npm run coverage

      - name: Generate backend coverage
        working-directory: backend
        run: npm run coverage

      - name: Run SonarCloud analysis
        uses: sonarsource/sonarcloud-github-action@v1
        with:
          args: >
            -Dsonar.organization=tadashi-dev-eng
            -Dsonar.projectKey=tadashi-dev-eng_DSO101_SS26_Project
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

  docker-publish:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: [sonarcloud]
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-app:${{ github.sha }}
          platforms: linux/amd64,linux/arm64

      - name: Notify Render to redeploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_WEBHOOK }}" ]; then
            echo "Calling Render deploy hook..."
            curl -X POST "${{ secrets.RENDER_DEPLOY_WEBHOOK }}"
          else
            echo "No Render deploy hook configured, skipping redeploy."
          fi
